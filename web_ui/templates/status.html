<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMEGA AGI - 系统状态</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%); color: #e0e0e0; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 30px; }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo-icon { width: 50px; height: 50px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .logo h1 { font-size: 28px; font-weight: 700; background: linear-gradient(90deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav { display: flex; gap: 10px; }
        .nav a { padding: 10px 20px; background: rgba(255,255,255,0.05); border-radius: 8px; color: #fff; text-decoration: none; transition: all 0.3s; }
        .nav a:hover, .nav a.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 25px; border: 1px solid rgba(255,255,255,0.08); }
        .card-title { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .card-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-success { background: rgba(72,199,142,0.2); color: #48c78e; }
        .badge-warning { background: rgba(255,159,67,0.2); color: #ff9f43; }
        .badge-error { background: rgba(255,71,87,0.2); color: #ff4757; }
        .layer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .layer-card { background: rgba(255,255,255,0.02); border-radius: 12px; padding: 20px; text-align: center; transition: all 0.3s; }
        .layer-card:hover { transform: translateY(-3px); }
        .layer-icon { width: 60px; height: 60px; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; }
        .layer-name { font-size: 14px; font-weight: 600; margin-bottom: 5px; }
        .layer-status { font-size: 12px; color: #888; margin-bottom: 10px; }
        .layer-health { font-size: 28px; font-weight: 700; }
        .gauge-container { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .gauge { text-align: center; }
        .gauge svg { width: 120px; height: 120px; }
        .gauge-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 10; }
        .gauge-fill { fill: none; stroke-width: 10; stroke-linecap: round; transform: rotate(-90deg); transform-origin: center; transition: stroke-dashoffset 1s; }
        .gauge-label { font-size: 14px; color: #888; margin-top: 10px; }
        .gauge-value { font-size: 24px; font-weight: 700; margin-top: 5px; }
        .service-list { display: flex; flex-direction: column; gap: 12px; }
        .service-item { display: flex; align-items: center; gap: 15px; padding: 12px 15px; background: rgba(255,255,255,0.02); border-radius: 10px; }
        .service-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .service-info { flex: 1; }
        .service-name { font-size: 14px; font-weight: 600; }
        .service-detail { font-size: 12px; color: #888; }
        .service-status { width: 10px; height: 10px; border-radius: 50%; }
        .status-green { background: #48c78e; box-shadow: 0 0 10px #48c78e; }
        .status-red { background: #ff4757; box-shadow: 0 0 10px #ff4757; }
        .status-yellow { background: #ff9f43; box-shadow: 0 0 10px #ff9f43; }
        .alert-list { display: flex; flex-direction: column; gap: 10px; max-height: 250px; overflow-y: auto; }
        .alert-item { display: flex; gap: 12px; padding: 12px 15px; background: rgba(255,255,255,0.02); border-radius: 10px; border-left: 3px solid; }
        .alert-item.critical { border-color: #ff4757; }
        .alert-item.warning { border-color: #ff9f43; }
        .alert-item.info { border-color: #4facfe; }
        .alert-time { font-size: 12px; color: #666; font-family: monospace; min-width: 70px; }
        .alert-message { font-size: 13px; flex: 1; }
        .last-update { font-size: 12px; color: #666; text-align: right; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">Ω</div>
                <h1>OMEGA AGI</h1>
            </div>
            <nav class="nav">
                <a href="/">仪表盘</a>
                <a href="/config">配置</a>
                <a href="/status" class="active">状态</a>
                <a href="/diagnostics">诊断</a>
            </nav>
        </header>

        <div class="grid">
            <!-- Core Layers 状态 -->
            <div class="card" style="grid-column: span 2;">
                <div class="card-title">
                    Core Layers
                    <span class="card-badge badge-success" id="layers-count">6 运行中</span>
                </div>
                <div class="layer-grid" id="layer-grid">
                    <!-- 动态加载 -->
                </div>
            </div>

            <!-- 资源使用率 -->
            <div class="card">
                <div class="card-title">资源使用率</div>
                <div class="gauge-container">
                    <div class="gauge">
                        <svg viewBox="0 0 120 120">
                            <circle class="gauge-bg" cx="60" cy="60" r="50"/>
                            <circle class="gauge-fill" id="cpu-gauge" cx="60" cy="60" r="50" stroke="#667eea" stroke-dasharray="314" stroke-dashoffset="314"/>
                        </svg>
                        <div class="gauge-label">CPU</div>
                        <div class="gauge-value" id="cpu-value">0%</div>
                    </div>
                    <div class="gauge">
                        <svg viewBox="0 0 120 120">
                            <circle class="gauge-bg" cx="60" cy="60" r="50"/>
                            <circle class="gauge-fill" id="memory-gauge" cx="60" cy="60" r="50" stroke="#764ba2" stroke-dasharray="314" stroke-dashoffset="314"/>
                        </svg>
                        <div class="gauge-label">内存</div>
                        <div class="gauge-value" id="memory-value">0%</div>
                    </div>
                    <div class="gauge">
                        <svg viewBox="0 0 120 120">
                            <circle class="gauge-bg" cx="60" cy="60" r="50"/>
                            <circle class="gauge-fill" id="disk-gauge" cx="60" cy="60" r="50" stroke="#f093fb" stroke-dasharray="314" stroke-dashoffset="314"/>
                        </svg>
                        <div class="gauge-label">磁盘</div>
                        <div class="gauge-value" id="disk-value">0%</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid">
            <!-- 服务健康 -->
            <div class="card">
                <div class="card-title">服务健康</div>
                <div class="service-list" id="service-list">
                    <!-- 动态加载 -->
                </div>
            </div>

            <!-- 最近告警 -->
            <div class="card">
                <div class="card-title">最近告警</div>
                <div class="alert-list" id="alert-list">
                    <!-- 动态加载 -->
                </div>
                <div class="last-update" id="last-update">最后更新: --</div>
            </div>
        </div>
    </div>

    <script>
        const layerColors = {
            'C_e': '#667eea',
            'E_s': '#764ba2',
            'B_h': '#f093fb',
            'S_d': '#f5576c',
            'Q_c': '#4facfe',
            'V_e': '#43e97b'
        };

        async function loadStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                if (data.success) {
                    updateResources(data.data.resources);
                    updateLayers(data.data.layers);
                    updateLastUpdate();
                }
            } catch (e) {
                console.error('Failed to load status:', e);
            }
        }

        function updateResources(resources) {
            // CPU
            const cpu = Math.round(resources.cpu.percent);
            updateGauge('cpu', cpu);

            // Memory
            const mem = Math.round(resources.memory.percent);
            updateGauge('memory', mem);

            // Disk
            const disk = Math.round(resources.disk.percent);
            updateGauge('disk', disk);

            // Service list
            const services = [
                { name: 'API Server', detail: `Port 5000`, status: 'green' },
                { name: 'Config Manager', detail: `${resources.memory.used_gb}GB used`, status: 'green' },
                { name: 'LLM Provider', detail: 'OpenAI GPT-4', status: 'green' },
                { name: 'Memory Service', detail: 'Connected', status: 'yellow' },
                { name: 'Log Service', detail: 'Active', status: 'green' }
            ];

            let serviceHtml = '';
            services.forEach(s => {
                serviceHtml += `
                    <div class="service-item">
                        <div class="service-icon" style="background:${layerColors['C_e']}22;">📡</div>
                        <div class="service-info">
                            <div class="service-name">${s.name}</div>
                            <div class="service-detail">${s.detail}</div>
                        </div>
                        <div class="service-status status-${s.status}"></div>
                    </div>
                `;
            });
            document.getElementById('service-list').innerHTML = serviceHtml;
        }

        function updateGauge(name, value) {
            const gauge = document.getElementById(`${name}-gauge`);
            const valueEl = document.getElementById(`${name}-value`);
            const circumference = 314; // 2 * PI * 50
            const offset = circumference - (value / 100) * circumference;
            gauge.style.strokeDashoffset = offset;
            valueEl.textContent = `${value}%`;

            const color = value > 90 ? '#ff4757' : value > 70 ? '#ff9f43' : '#48c78e';
            gauge.style.stroke = color;
            valueEl.style.color = color;
        }

        function updateLayers(layers) {
            let html = '';
            let running = 0;
            for (const [key, layer] of Object.entries(layers)) {
                const color = layerColors[key] || '#667eea';
                const healthColor = layer.health > 80 ? '#48c78e' : layer.health > 60 ? '#ff9f43' : '#ff4757';
                if (layer.status === 'running') running++;
                html += `
                    <div class="layer-card" style="border-top: 3px solid ${color};">
                        <div class="layer-icon" style="background:linear-gradient(135deg,${color},${color}66);color:#fff;">${key}</div>
                        <div class="layer-name">${layer.name}</div>
                        <div class="layer-status">${layer.status}</div>
                        <div class="layer-health" style="color:${healthColor};">${layer.health}%</div>
                    </div>
                `;
            }
            document.getElementById('layer-grid').innerHTML = html;
            document.getElementById('layers-count').textContent = `${running} 运行中`;
        }

        function updateLastUpdate() {
            const now = new Date();
            document.getElementById('last-update').textContent = `最后更新: ${now.toLocaleTimeString()}`;
        }

        // 生成模拟告警
        function updateAlerts() {
            const alerts = [
                { level: 'warning', time: '10:15:32', message: 'Memory usage above 85% threshold' },
                { level: 'info', time: '09:45:10', message: 'Layer C_e health check passed (95%)' },
                { level: 'critical', time: '08:30:00', message: 'Failed to connect to backup storage' },
                { level: 'warning', time: '08:15:22', message: 'High latency detected on Q_c layer' },
                { level: 'info', time: '07:00:00', message: 'Daily system maintenance completed' }
            ];

            let html = '';
            alerts.forEach(a => {
                html += `
                    <div class="alert-item ${a.level}">
                        <span class="alert-time">${a.time}</span>
                        <span class="alert-message">${a.message}</span>
                    </div>
                `;
            });
            document.getElementById('alert-list').innerHTML = html;
        }

        loadStatus();
        updateAlerts();
        setInterval(loadStatus, 5000);
    </script>
</body>
</html>
