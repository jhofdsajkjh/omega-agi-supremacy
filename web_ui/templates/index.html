<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMEGA AGI - 主仪表盘</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%); color: #e0e0e0; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 30px; }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo-icon { width: 50px; height: 50px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .logo h1 { font-size: 28px; font-weight: 700; background: linear-gradient(90deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav { display: flex; gap: 10px; }
        .nav a { padding: 10px 20px; background: rgba(255,255,255,0.05); border-radius: 8px; color: #fff; text-decoration: none; transition: all 0.3s; }
        .nav a:hover, .nav a.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 25px; border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(10px); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card-title { font-size: 18px; font-weight: 600; color: #fff; }
        .card-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-success { background: rgba(72,199,142,0.2); color: #48c78e; }
        .badge-warning { background: rgba(255,159,67,0.2); color: #ff9f43; }
        .badge-error { background: rgba(255,71,87,0.2); color: #ff4757; }
        .quick-links { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .quick-link { display: flex; align-items: center; gap: 12px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 10px; color: #fff; text-decoration: none; transition: all 0.3s; border: 1px solid transparent; }
        .quick-link:hover { border-color: #667eea; background: rgba(102,126,234,0.1); transform: translateY(-2px); }
        .quick-link-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .quick-link-text h3 { font-size: 14px; margin-bottom: 4px; }
        .quick-link-text p { font-size: 12px; color: #888; }
        .status-indicators { display: flex; flex-direction: column; gap: 12px; }
        .indicator { display: flex; align-items: center; gap: 15px; padding: 12px 15px; background: rgba(255,255,255,0.02); border-radius: 10px; }
        .indicator-name { flex: 1; font-size: 14px; }
        .indicator-bar { width: 100px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        .indicator-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
        .indicator-value { font-size: 14px; font-weight: 600; width: 50px; text-align: right; }
        .layer-list { display: flex; flex-direction: column; gap: 10px; }
        .layer-item { display: flex; align-items: center; gap: 12px; padding: 12px 15px; background: rgba(255,255,255,0.02); border-radius: 10px; }
        .layer-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; }
        .layer-info { flex: 1; }
        .layer-name { font-size: 14px; font-weight: 600; }
        .layer-status { font-size: 12px; color: #888; }
        .layer-health { font-size: 14px; font-weight: 700; }
        .logs-container { max-height: 300px; overflow-y: auto; }
        .log-entry { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
        .log-time { color: #666; font-family: monospace; }
        .log-level { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .log-info { background: rgba(72,199,142,0.2); color: #48c78e; }
        .log-warn { background: rgba(255,159,67,0.2); color: #ff9f43; }
        .log-error { background: rgba(255,71,87,0.2); color: #ff4757; }
        .log-message { color: #ccc; flex: 1; }
        .footer { text-align: center; padding: 20px; color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">Ω</div>
                <div>
                    <h1>OMEGA AGI</h1>
                    <p style="color:#888;font-size:12px;">Supremacy Control Center</p>
                </div>
            </div>
            <nav class="nav">
                <a href="/" class="active">仪表盘</a>
                <a href="/config">配置</a>
                <a href="/status">状态</a>
                <a href="/diagnostics">诊断</a>
            </nav>
        </header>

        <div class="grid">
            <!-- 系统概览 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">系统概览</span>
                    <span class="card-badge badge-success" id="health-badge">正常</span>
                </div>
                <div class="status-indicators">
                    <div class="indicator">
                        <span class="indicator-name">CPU 使用率</span>
                        <div class="indicator-bar"><div class="indicator-fill" id="cpu-bar" style="width:0%;background:#667eea;"></div></div>
                        <span class="indicator-value" id="cpu-value">0%</span>
                    </div>
                    <div class="indicator">
                        <span class="indicator-name">内存使用率</span>
                        <div class="indicator-bar"><div class="indicator-fill" id="memory-bar" style="width:0%;background:#764ba2;"></div></div>
                        <span class="indicator-value" id="memory-value">0%</span>
                    </div>
                    <div class="indicator">
                        <span class="indicator-name">磁盘使用率</span>
                        <div class="indicator-bar"><div class="indicator-fill" id="disk-bar" style="width:0%;background:#f093fb;"></div></div>
                        <span class="indicator-value" id="disk-value">0%</span>
                    </div>
                </div>
            </div>

            <!-- 快速配置入口 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">快速配置</span>
                </div>
                <div class="quick-links">
                    <a href="/config" class="quick-link">
                        <div class="quick-link-icon" style="background:linear-gradient(135deg,#667eea,#764ba2);">⚙️</div>
                        <div class="quick-link-text">
                            <h3>LLM 配置</h3>
                            <p>设置API密钥和模型</p>
                        </div>
                    </a>
                    <a href="/config#providers" class="quick-link">
                        <div class="quick-link-icon" style="background:linear-gradient(135deg,#f093fb,#f5576c);">🔑</div>
                        <div class="quick-link-text">
                            <h3>添加提供商</h3>
                            <p>配置新的LLM服务</p>
                        </div>
                    </a>
                    <a href="/status" class="quick-link">
                        <div class="quick-link-icon" style="background:linear-gradient(135deg,#4facfe,#00f2fe);">📊</div>
                        <div class="quick-link-text">
                            <h3>查看状态</h3>
                            <p>监控系统资源</p>
                        </div>
                    </a>
                    <a href="/diagnostics" class="quick-link">
                        <div class="quick-link-icon" style="background:linear-gradient(135deg,#43e97b,#38f9d7);">🔍</div>
                        <div class="quick-link-text">
                            <h3>自诊断</h3>
                            <p>检测并修复问题</p>
                        </div>
                    </a>
                </div>
            </div>

            <!-- 活跃层状态 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">Core Layers</span>
                    <span class="card-badge badge-success">6 Active</span>
                </div>
                <div class="layer-list" id="layer-list">
                    <div class="layer-item">
                        <div class="layer-icon" style="background:linear-gradient(135deg,#667eea,#764ba2);">C</div>
                        <div class="layer-info">
                            <div class="layer-name">Cognition Engine</div>
                            <div class="layer-status">Running</div>
                        </div>
                        <div class="layer-health" style="color:#48c78e;">95%</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 最新日志 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">实时日志</span>
                <button onclick="loadLogs()" style="background:transparent;border:1px solid #667eea;color:#667eea;padding:5px 15px;border-radius:6px;cursor:pointer;">刷新</button>
            </div>
            <div class="logs-container" id="logs">
                <div class="log-entry">
                    <span class="log-time">--:--:--</span>
                    <span class="log-level log-info">INFO</span>
                    <span class="log-message">加载中...</span>
                </div>
            </div>
        </div>

        <div class="footer">
            OMEGA AGI Supremacy v2.0 | © 2026
        </div>
    </div>

    <script>
        async function loadStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                if (data.success) {
                    const r = data.data.resources;
                    updateIndicator('cpu', r.cpu.percent);
                    updateIndicator('memory', r.memory.percent);
                    updateIndicator('disk', r.disk.percent);

                    // Update layers
                    const layerList = document.getElementById('layer-list');
                    let layersHtml = '';
                    for (const [key, layer] of Object.entries(data.data.layers)) {
                        const colors = ['#667eea','#764ba2','#f093fb','#f5576c','#4facfe','#43e97b'];
                        const idx = Object.keys(data.data.layers).indexOf(key);
                        const color = colors[idx % colors.length];
                        const healthColor = layer.health > 80 ? '#48c78e' : layer.health > 60 ? '#ff9f43' : '#ff4757';
                        layersHtml += `
                            <div class="layer-item">
                                <div class="layer-icon" style="background:linear-gradient(135deg,${color},${color}88);">${key[0]}</div>
                                <div class="layer-info">
                                    <div class="layer-name">${layer.name}</div>
                                    <div class="layer-status">${layer.status}</div>
                                </div>
                                <div class="layer-health" style="color:${healthColor};">${layer.health}%</div>
                            </div>
                        `;
                    }
                    layerList.innerHTML = layersHtml;

                    // Update health badge
                    const health = data.data;
                    const badge = document.getElementById('health-badge');
                    if (health.status === 'healthy') {
                        badge.textContent = '正常';
                        badge.className = 'card-badge badge-success';
                    } else {
                        badge.textContent = '降级';
                        badge.className = 'card-badge badge-warning';
                    }
                }
            } catch (e) {
                console.error('Failed to load status:', e);
            }
        }

        function updateIndicator(name, value) {
            document.getElementById(`${name}-bar`).style.width = `${value}%`;
            document.getElementById(`${name}-value`).textContent = `${Math.round(value)}%`;
            const bar = document.getElementById(`${name}-bar`);
            if (value > 90) bar.style.background = '#ff4757';
            else if (value > 70) bar.style.background = '#ff9f43';
            else bar.style.background = '#48c78e';
        }

        async function loadLogs() {
            const logsEl = document.getElementById('logs');
            const now = new Date();
            const time = now.toTimeString().split(' ')[0];
            logsEl.innerHTML = `
                <div class="log-entry"><span class="log-time">${time}</span><span class="log-level log-info">INFO</span><span class="log-message">System initialized successfully</span></div>
                <div class="log-entry"><span class="log-time">${time}</span><span class="log-level log-info">INFO</span><span class="log-message">All layers loaded and running</span></div>
                <div class="log-entry"><span class="log-time">${time}</span><span class="log-level log-info">INFO</span><span class="log-message">Configuration loaded from /root/omega-agi-supremacy/web_ui/llm_configs.json</span></div>
                <div class="log-entry"><span class="log-time">${time}</span><span class="log-level log-warn">WARN</span><span class="log-message">GPU acceleration not available - using CPU fallback</span></div>
                <div class="log-entry"><span class="log-time">${time}</span><span class="log-level log-error">ERROR</span><span class="log-message">Failed to connect to optional memory service</span></div>
            `;
        }

        loadStatus();
        loadLogs();
        setInterval(loadStatus, 5000);
    </script>
</body>
</html>
